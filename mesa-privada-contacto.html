<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa Privada - Catering Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 420px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            padding: 40px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 300px;
            height: 300px;
            background: rgba(255,0,0,0.1);
            border-radius: 50%;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            font-weight: 900;
            font-size: 24px;
            color: #d32f2f;
            text-align: center;
            line-height: 1.2;
        }

        .logo-img {
            max-width: 280px;
            width: 100%;
            height: auto;
            margin: 0 auto 20px;
            display: block;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
        }

        .title {
            color: white;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #d32f2f;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .divider {
            height: 3px;
            background: #d32f2f;
            width: 60px;
            margin: 15px auto 0;
        }

        .content {
            padding: 30px 20px;
        }

        .contact-group {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid #f0f0f0;
        }

        .contact-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .person-name {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        .person-name::before {
            content: '';
            width: 4px;
            height: 4px;
            background: #d32f2f;
            border-radius: 50%;
            margin-right: 10px;
        }

        .phone-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .phone-item:hover {
            background: #f5f5f5;
            color: #d32f2f;
        }

        .phone-item:active {
            background: #e8e8e8;
        }

        .phone-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .phone-number {
            font-size: 14px;
            font-weight: 500;
            flex: 1;
        }

        .phone-label {
            font-size: 11px;
            background: #f0f0f0;
            color: #666;
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .note {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
            font-style: italic;
            padding-left: 32px;
        }

        .location {
            display: flex;
            align-items: center;
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            padding-left: 32px;
        }

        .location::before {
            content: '📍';
            margin-right: 6px;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding: 0 20px 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-save {
            background: #d32f2f;
            color: white;
        }

        .btn-save:active {
            background: #b71c1c;
            transform: scale(0.98);
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
        }

        .btn-whatsapp:active {
            background: #20ba5d;
            transform: scale(0.98);
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin: 20px;
            font-size: 13px;
        }

        @media (max-width: 480px) {
            .card {
                border-radius: 16px;
            }

            .title {
                font-size: 24px;
            }

            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="card">
            <div class="loading">Cargando contactos...</div>
        </div>
    </div>

    <script>
        // URL del JSON con los datos (usar GitHub Raw)
        const DATA_URL = 'https://raw.githubusercontent.com/mviejo2/mesaprivada/main/contactos.json';

        async function loadContacts() {
            try {
                const response = await fetch(DATA_URL, { 
                    cache: 'no-store',
                    headers: { 'Cache-Control': 'no-cache' }
                });
                
                if (!response.ok) throw new Error('No se pudieron cargar los datos');
                
                const data = await response.json();
                renderCard(data);
            } catch (error) {
                console.error('Error:', error);
                // Datos de fallback si no se puede cargar
                const fallbackData = {
                    "empresa": "MESA PRIVADA",
                    "slogan": "CATERING EXPERIENCE",
                    "contactos": [
                        {
                            "nombre": "Bárbara Benites",
                            "ubicacion": "Perú",
                            "telefonos": [
                                { "numero": "+51944707043", "tipo": "Móvil" },
                                { "numero": "+51967790216", "tipo": "Móvil" }
                            ]
                        },
                        {
                            "nombre": "Matías Viejo",
                            "ubicacion": "Chile",
                            "telefonos": [
                                { "numero": "+56982050318", "tipo": "WhatsApp" }
                            ],
                            "nota": "Solo WhatsApp"
                        }
                    ]
                };
                renderCard(fallbackData);
            }
        }

        function renderCard(data) {
            const card = document.getElementById('card');
            
            let html = `
                <div class="header">
                    <img src="https://raw.githubusercontent.com/matiasviejo/mesa-privada-data/main/logo-mesa-privada.png" alt="Mesa Privada" class="logo-img">
                    <div class="title">${data.empresa}</div>
                    <div class="subtitle">${data.slogan}</div>
                    <div class="divider"></div>
                </div>
                <div class="content">
            `;

            data.contactos.forEach(contacto => {
                html += `
                    <div class="contact-group">
                        <div class="person-name">${contacto.nombre}</div>
                `;

                contacto.telefonos.forEach(tel => {
                    const isWhatsApp = tel.tipo === 'WhatsApp';
                    const href = isWhatsApp 
                        ? `https://wa.me/${tel.numero.replace(/\D/g, '')}`
                        : `tel:${tel.numero}`;
                    
                    html += `
                        <a href="${href}" class="phone-item" onclick="event.preventDefault(); handleContact('${tel.numero}', ${isWhatsApp})">
                            <div class="phone-icon">${isWhatsApp ? '💬' : '☎️'}</div>
                            <div class="phone-number">${tel.numero}</div>
                            <div class="phone-label">${tel.tipo}</div>
                        </a>
                    `;
                });

                // Si tiene WhatsApp adicional
                if (contacto.whatsapp) {
                    html += `
                        <a href="https://wa.me/${contacto.whatsapp.replace(/\D/g, '')}" class="phone-item" onclick="event.preventDefault(); handleContact('${contacto.whatsapp}', true)">
                            <div class="phone-icon">💬</div>
                            <div class="phone-number">${contacto.whatsapp}</div>
                            <div class="phone-label">WhatsApp</div>
                        </a>
                    `;
                }

                if (contacto.nota) {
                    html += `<div class="note">⚡ ${contacto.nota}</div>`;
                }

                html += `<div class="location">${contacto.ubicacion}</div>`;
                html += `</div>`;
            });

            html += `
                </div>
                <div class="actions">
                    <button class="btn btn-save" onclick="saveContact()">Guardar Contactos</button>
                </div>
            `;

            card.innerHTML = html;
        }

        function handleContact(number, isWhatsApp) {
            if (isWhatsApp) {
                window.open(`https://wa.me/${number.replace(/\D/g, '')}`, '_blank');
            } else {
                window.location.href = `tel:${number}`;
            }
        }

        function saveContact() {
            // Crear vCard para guardar en contactos
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Mesa Privada - Catering
ORG:Mesa Privada
TEL;TYPE=CELL:+51944707043
TEL;TYPE=CELL:+51967790216
TEL;TYPE=CELL:+56982050318
END:VCARD`;

            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mesa-privada-contactos.vcf';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Recargar datos cada 5 minutos para obtener actualizaciones
        loadContacts();
        setInterval(loadContacts, 5 * 60 * 1000);
    </script>
</body>
</html>
